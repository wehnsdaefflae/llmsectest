name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev,cvss]"
      - run: ruff check src tests
      - run: pytest -q

  # The tool must actually run, not just pass unit tests: scan the offline
  # hardened demo (exit 0, no findings) and validate the SARIF it emits.
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -e ".[cvss]"
      - run: llmsectest --check
      - run: llmsectest --target demo-defended
      - run: llmsectest --target demo-defended --validate
